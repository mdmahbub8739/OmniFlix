<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#070709">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OmniFlix — Cinema, everywhere.</title>
<meta name="description" content="OmniFlix — a cinematic streaming experience. Films, series & anime, beautifully.">

<!-- Base for History API routing (no hashes in URL) -->
<base href="/">

<!-- Inline SVG favicon — crisp at any resolution. Orbital "O" + play "▶". -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23FF6B6B'/><stop offset='1' stop-color='%23FF3B30'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='%230B0C10'/><circle cx='32' cy='32' r='23' fill='none' stroke='url(%23g)' stroke-width='1' stroke-dasharray='1.5 3' opacity='0.55'/><circle cx='32' cy='32' r='18' fill='none' stroke='url(%23g)' stroke-width='2.6'/><circle cx='32' cy='32' r='12' fill='none' stroke='url(%23g)' stroke-width='0.8' opacity='0.4'/><circle cx='32' cy='9' r='1.8' fill='url(%23g)'/><circle cx='55' cy='32' r='1.8' fill='url(%23g)'/><circle cx='32' cy='55' r='1.8' fill='url(%23g)'/><circle cx='9' cy='32' r='1.8' fill='url(%23g)'/><path d='M28.5 24 L28.5 40 L41 32 Z' fill='url(%23g)'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23FF6B6B'/><stop offset='1' stop-color='%23FF3B30'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='%230B0C10'/><circle cx='32' cy='32' r='23' fill='none' stroke='url(%23g)' stroke-width='1' stroke-dasharray='1.5 3' opacity='0.55'/><circle cx='32' cy='32' r='18' fill='none' stroke='url(%23g)' stroke-width='2.6'/><circle cx='32' cy='32' r='12' fill='none' stroke='url(%23g)' stroke-width='0.8' opacity='0.4'/><circle cx='32' cy='9' r='1.8' fill='url(%23g)'/><circle cx='55' cy='32' r='1.8' fill='url(%23g)'/><circle cx='32' cy='55' r='1.8' fill='url(%23g)'/><circle cx='9' cy='32' r='1.8' fill='url(%23g)'/><path d='M28.5 24 L28.5 40 L41 32 Z' fill='url(%23g)'/></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://image.tmdb.org" crossorigin>
<link rel="preconnect" href="https://api.themoviedb.org">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- Reusable inline-SVG brand mark (defined once, referenced via <use>).
     OmniFlix logo = triple orbital ring + 4 cardinal satellite dots ("omni"
     = everywhere) + a central play triangle ("flix"). Built with a single
     gradient and 9 primitives — sharp at any size, light on the DOM. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="of-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF3B30"/>
    </linearGradient>
    <symbol id="omni-mark" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="14" fill="#0B0C10"/>
      <circle cx="32" cy="32" r="23" fill="none" stroke="url(#of-grad)" stroke-width="1"   stroke-dasharray="1.5 3" opacity="0.55"/>
      <circle cx="32" cy="32" r="18" fill="none" stroke="url(#of-grad)" stroke-width="2.6"/>
      <circle cx="32" cy="32" r="12" fill="none" stroke="url(#of-grad)" stroke-width="0.8" opacity="0.4"/>
      <circle cx="32" cy="9"  r="1.8" fill="url(#of-grad)"/>
      <circle cx="55" cy="32" r="1.8" fill="url(#of-grad)"/>
      <circle cx="32" cy="55" r="1.8" fill="url(#of-grad)"/>
      <circle cx="9"  cy="32" r="1.8" fill="url(#of-grad)"/>
      <path d="M28.5 24 L28.5 40 L41 32 Z" fill="url(#of-grad)"/>
    </symbol>
  </defs>
</svg>
</head>
<body>

<!-- Ambient mesh background -->
<div class="mesh" aria-hidden="true">
  <div class="mesh__layer mesh__layer--a"></div>
  <div class="mesh__layer mesh__layer--b"></div>
  <div class="mesh__layer mesh__layer--c"></div>
  <div class="mesh__grain"></div>
</div>

<!-- Cursor spotlight (desktop only) -->
<div class="cursor-spot" id="cursorSpot" aria-hidden="true"></div>

<!-- Splash -->
<div class="splash" id="splash">
  <div class="splash__inner">
    <svg class="splash__logo" viewBox="0 0 64 64" aria-hidden="true"><use href="#omni-mark"/></svg>
    <div class="splash__word">Omni<em>Flix</em></div>
    <div class="splash__tag">Cinema, everywhere</div>
    <div class="splash__loader"><span></span></div>
  </div>
</div>

<!-- TOP NAV -->
<header class="topnav">
  <a class="brand" href="/" data-link>
    <svg class="brand__logo" viewBox="0 0 64 64" aria-hidden="true"><use href="#omni-mark"/></svg>
    <span class="brand__name">Omni<em>Flix</em></span>
  </a>

  <nav class="topnav__links" id="topnavLinks">
    <a href="/" data-link data-route="home">Home</a>
    <a href="/movies" data-link data-route="movies">Films</a>
    <a href="/tv" data-link data-route="tv">Series</a>
    <a href="/anime" data-link data-route="anime">Anime</a>
    <a href="/people" data-link data-route="people">People</a>
    <a href="/list" data-link data-route="list">My List</a>
  </nav>

  <div class="topnav__tools">
    <button class="icon-btn" id="searchBtn" aria-label="Search"><i class="ri-search-2-line"></i></button>
    <button class="icon-btn" id="themeBtn" aria-label="Switch accent"><i class="ri-contrast-2-line"></i></button>
  </div>
</header>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottomnav bottomnav--six" id="bottomNav">
  <a href="/" data-link data-route="home"><i class="ri-home-5-line"></i><span>Home</span></a>
  <a href="/movies" data-link data-route="movies"><i class="ri-film-line"></i><span>Films</span></a>
  <a href="/tv" data-link data-route="tv"><i class="ri-tv-2-line"></i><span>Series</span></a>
  <a href="/anime" data-link data-route="anime"><i class="ri-sparkling-2-line"></i><span>Anime</span></a>
  <a href="/people" data-link data-route="people"><i class="ri-team-line"></i><span>People</span></a>
  <a href="/list" data-link data-route="list"><i class="ri-bookmark-line"></i><span>List</span></a>
</nav>

<!-- ROUTE VIEW -->
<main class="view" id="view"></main>

<!-- PERSISTENT PLAYER HOST
     The iframe inside is NEVER destroyed during minimize/expand —
     it is only repositioned via CSS transforms so playback continues. -->
<div id="player-host" class="player-host" data-mode="hidden" aria-hidden="true">
  <div class="player-host__frame" id="playerFrame">
    <div class="player-host__loader" id="playerLoader">
      <div class="player-host__loader-bg" id="playerLoaderBg"></div>
      <div class="player-host__loader-veil"></div>
      <div class="player-host__loader-spinner"><span></span><span></span><span></span></div>
      <div class="player-host__loader-status" id="playerLoaderStatus"></div>
    </div>
  </div>

  <!-- Mini-mode chrome (only visible in mini mode, fades in on hover) -->
  <div class="player-host__chrome" aria-hidden="true">
    <div class="player-host__chrome-veil"></div>
    <div class="player-host__grip"></div>
    <button class="player-host__btn player-host__btn--expand" id="miniExpand" aria-label="Expand"><i class="ri-fullscreen-line"></i></button>
    <!-- Close button intentionally removed: closing destroyed the player and left a blank stage. -->
    <!-- YouTube-style resize handle (corner drag on desktop; pinch-to-zoom on touch). -->
    <button class="player-host__resize" id="miniResize" aria-label="Resize" tabindex="-1"><i class="ri-expand-diagonal-line"></i></button>
    <!-- Transparent shield: captures drag + single-tap-controls + double-tap-expand -->
    <div class="player-host__shield" id="miniShield"></div>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<aside class="search" id="search" aria-hidden="true">
  <div class="search__head">
    <i class="ri-search-2-line"></i>
    <input id="searchInput" type="text" placeholder="Search films, series, people…" autocomplete="off" spellcheck="false">
    <button class="icon-btn" id="searchClose" aria-label="Close"><i class="ri-close-line"></i></button>
  </div>
  <div class="search__body">
    <div class="search__suggest" id="searchSuggest">
      <div class="search__sectiontitle">Try a vibe</div>
      <div class="search__chips" id="searchChips"></div>
      <div class="search__sectiontitle" style="margin-top:28px">Trending now</div>
      <div class="search__trending" id="searchTrending"></div>
    </div>
    <div class="search__results" id="searchResults" hidden></div>
  </div>
</aside>

<!-- TOAST -->
<div class="toast" id="toast" aria-live="polite"></div>

<!-- SETTINGS SHEET (accent + PiP toggle) -->
<div class="sheet" id="themeSheet" aria-hidden="true">
  <div class="sheet__panel">

    <!-- Highlighted PiP / mini-player toggle.  The "highlight" border +
         glow draws the eye the moment the sheet opens, so users always
         find the switch instead of hunting through menus. -->
    <div class="setting-row setting-row--highlight" id="pipRow">
      <div class="setting-row__icon"><i class="ri-picture-in-picture-2-line"></i></div>
      <div class="setting-row__text">
        <div class="setting-row__title">Mini player <span class="setting-row__badge">PiP</span></div>
        <div class="setting-row__sub">Float the video in a corner while you keep browsing.</div>
      </div>
      <button class="switch" id="pipToggle" role="switch" aria-checked="true" aria-label="Toggle mini player">
        <span class="switch__thumb"></span>
      </button>
    </div>

    <h3>Choose your accent</h3>
    <p>Tints every gradient, glow, and highlight across the app.</p>
    <div class="palette" id="palette"></div>
    <button class="btn-ghost" id="themeClose">Done</button>
  </div>
</div>

<!-- Runtime config (proxy URL etc.). MUST load before app.js. -->
<script src="config.js"></script>
<script src="player.js"></script>
<script src="app.js"></script>
</body>
</html>
